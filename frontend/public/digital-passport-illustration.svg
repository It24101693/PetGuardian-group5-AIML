<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:0.05" />
    </linearGradient>
    <linearGradient id="cardGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="800" height="400" fill="url(#bgGradient1)"/>
  
  <!-- Main passport card -->
  <g transform="translate(200, 80)">
    <!-- Card shadow -->
    <rect x="5" y="5" width="400" height="240" rx="20" fill="#000" opacity="0.1"/>
    <!-- Card -->
    <rect x="0" y="0" width="400" height="240" rx="20" fill="url(#cardGradient)"/>
    
    <!-- Pet icon -->
    <circle cx="80" cy="80" r="35" fill="#fff" opacity="0.2"/>
    <g transform="translate(80, 80)">
      <!-- Dog face -->
      <circle cx="0" cy="0" r="20" fill="#fff"/>
      <circle cx="-8" cy="-5" r="3" fill="#1e293b"/>
      <circle cx="8" cy="-5" r="3" fill="#1e293b"/>
      <path d="M -6 5 Q 0 8 6 5" stroke="#1e293b" stroke-width="2" fill="none"/>
      <!-- Ears -->
      <ellipse cx="-18" cy="-8" rx="8" ry="15" fill="#fff"/>
      <ellipse cx="18" cy="-8" rx="8" ry="15" fill="#fff"/>
    </g>
    
    <!-- Text lines -->
    <rect x="130" y="45" width="200" height="12" rx="6" fill="#fff" opacity="0.9"/>
    <rect x="130" y="70" width="150" height="10" rx="5" fill="#fff" opacity="0.7"/>
    <rect x="130" y="90" width="180" height="10" rx="5" fill="#fff" opacity="0.7"/>
    
    <!-- QR Code -->
    <rect x="300" y="140" width="80" height="80" rx="8" fill="#fff"/>
    <g transform="translate(310, 150)">
      <rect x="0" y="0" width="15" height="15" fill="#1e293b"/>
      <rect x="20" y="0" width="10" height="10" fill="#1e293b"/>
      <rect x="35" y="0" width="10" height="10" fill="#1e293b"/>
      <rect x="50" y="0" width="10" height="10" fill="#1e293b"/>
      <rect x="0" y="20" width="10" height="10" fill="#1e293b"/>
      <rect x="15" y="20" width="10" height="10" fill="#1e293b"/>
      <rect x="30" y="20" width="15" height="15" fill="#1e293b"/>
      <rect x="50" y="20" width="10" height="10" fill="#1e293b"/>
      <rect x="0" y="35" width="10" height="10" fill="#1e293b"/>
      <rect x="20" y="35" width="10" height="10" fill="#1e293b"/>
      <rect x="50" y="35" width="10" height="10" fill="#1e293b"/>
      <rect x="0" y="50" width="15" height="10" fill="#1e293b"/>
      <rect x="20" y="50" width="10" height="10" fill="#1e293b"/>
      <rect x="35" y="50" width="10" height="10" fill="#1e293b"/>
      <rect x="50" y="50" width="10" height="10" fill="#1e293b"/>
    </g>
    
    <!-- Medical icons -->
    <circle cx="50" cy="180" r="15" fill="#fff" opacity="0.3"/>
    <path d="M 50 170 L 50 190 M 40 180 L 60 180" stroke="#fff" stroke-width="3"/>
    
    <circle cx="100" cy="180" r="15" fill="#fff" opacity="0.3"/>
    <circle cx="100" cy="180" r="8" fill="none" stroke="#fff" stroke-width="2"/>
    <path d="M 100 172 L 100 188" stroke="#fff" stroke-width="2"/>
  </g>
  
  <!-- Floating elements -->
  <circle cx="120" cy="100" r="8" fill="#3b82f6" opacity="0.3"/>
  <circle cx="680" cy="120" r="12" fill="#2563eb" opacity="0.2"/>
  <circle cx="650" cy="300" r="10" fill="#3b82f6" opacity="0.25"/>
</svg>
