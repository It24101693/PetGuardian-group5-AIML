<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:0.12" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:0.05" />
    </linearGradient>
  </defs>
  
  <rect width="800" height="400" fill="url(#bgGradient3)"/>
  
  <!-- Central hub -->
  <circle cx="400" cy="200" r="60" fill="#10b981" opacity="0.2"/>
  <circle cx="400" cy="200" r="45" fill="#10b981"/>
  
  <!-- Medical cross in center -->
  <rect x="390" y="175" width="20" height="50" rx="3" fill="#fff"/>
  <rect x="375" y="190" width="50" height="20" rx="3" fill="#fff"/>
  
  <!-- Vet profiles around the hub -->
  <!-- Top Left Vet -->
  <g transform="translate(200, 80)">
    <circle cx="0" cy="0" r="45" fill="#fff" stroke="#10b981" stroke-width="3"/>
    <circle cx="0" cy="-10" r="15" fill="#10b981"/>
    <path d="M -20 10 Q 0 25 20 10" fill="#10b981"/>
    <text x="0" y="65" text-anchor="middle" font-size="14" fill="#059669" font-weight="bold">Dr. Smith</text>
    <!-- Connection line -->
    <line x1="40" y1="30" x2="155" y2="125" stroke="#10b981" stroke-width="2" stroke-dasharray="5,5" opacity="0.5"/>
  </g>
  
  <!-- Top Right Vet -->
  <g transform="translate(600, 80)">
    <circle cx="0" cy="0" r="45" fill="#fff" stroke="#10b981" stroke-width="3"/>
    <circle cx="0" cy="-10" r="15" fill="#10b981"/>
    <path d="M -20 10 Q 0 25 20 10" fill="#10b981"/>
    <text x="0" y="65" text-anchor="middle" font-size="14" fill="#059669" font-weight="bold">Dr. Chen</text>
    <!-- Connection line -->
    <line x1="-40" y1="30" x2="-155" y2="125" stroke="#10b981" stroke-width="2" stroke-dasharray="5,5" opacity="0.5"/>
  </g>
  
  <!-- Bottom Left Vet -->
  <g transform="translate(200, 320)">
    <circle cx="0" cy="0" r="45" fill="#fff" stroke="#10b981" stroke-width="3"/>
    <circle cx="0" cy="-10" r="15" fill="#10b981"/>
    <path d="M -20 10 Q 0 25 20 10" fill="#10b981"/>
    <text x="0" y="65" text-anchor="middle" font-size="14" fill="#059669" font-weight="bold">Dr. Garcia</text>
    <!-- Connection line -->
    <line x1="40" y1="-30" x2="155" y2="-125" stroke="#10b981" stroke-width="2" stroke-dasharray="5,5" opacity="0.5"/>
  </g>
  
  <!-- Bottom Right Vet -->
  <g transform="translate(600, 320)">
    <circle cx="0" cy="0" r="45" fill="#fff" stroke="#10b981" stroke-width="3"/>
    <circle cx="0" cy="-10" r="15" fill="#10b981"/>
    <path d="M -20 10 Q 0 25 20 10" fill="#10b981"/>
    <text x="0" y="65" text-anchor="middle" font-size="14" fill="#059669" font-weight="bold">Dr. Lee</text>
    <!-- Connection line -->
    <line x1="-40" y1="-30" x2="-155" y2="-125" stroke="#10b981" stroke-width="2" stroke-dasharray="5,5" opacity="0.5"/>
  </g>
  
  <!-- Pets around center -->
  <g transform="translate(400, 200)">
    <!-- Dog paw -->
    <g transform="translate(-100, 0)">
      <circle cx="0" cy="0" r="8" fill="#059669" opacity="0.3"/>
      <circle cx="-8" cy="-12" r="5" fill="#059669" opacity="0.3"/>
      <circle cx="8" cy="-12" r="5" fill="#059669" opacity="0.3"/>
      <circle cx="-12" cy="8" r="5" fill="#059669" opacity="0.3"/>
      <circle cx="12" cy="8" r="5" fill="#059669" opacity="0.3"/>
    </g>
    
    <!-- Cat paw -->
    <g transform="translate(100, 0)">
      <circle cx="0" cy="0" r="8" fill="#059669" opacity="0.3"/>
      <circle cx="-8" cy="-12" r="5" fill="#059669" opacity="0.3"/>
      <circle cx="8" cy="-12" r="5" fill="#059669" opacity="0.3"/>
      <circle cx="-12" cy="8" r="5" fill="#059669" opacity="0.3"/>
      <circle cx="12" cy="8" r="5" fill="#059669" opacity="0.3"/>
    </g>
  </g>
  
  <!-- Floating hearts -->
  <path d="M 100 200 C 100 190 110 185 115 190 C 120 185 130 190 130 200 C 130 210 115 220 115 220 C 115 220 100 210 100 200" 
        fill="#10b981" opacity="0.2"/>
  <path d="M 680 180 C 680 170 690 165 695 170 C 700 165 710 170 710 180 C 710 190 695 200 695 200 C 695 200 680 190 680 180" 
        fill="#10b981" opacity="0.2"/>
</svg>
