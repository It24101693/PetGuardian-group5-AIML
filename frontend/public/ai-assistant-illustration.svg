<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0.05" />
    </linearGradient>
    <linearGradient id="botGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="800" height="400" fill="url(#bgGradient2)"/>
  
  <!-- AI Bot -->
  <g transform="translate(250, 80)">
    <!-- Bot body -->
    <rect x="80" y="80" width="140" height="160" rx="20" fill="url(#botGradient)"/>
    
    <!-- Bot head -->
    <rect x="90" y="40" width="120" height="100" rx="15" fill="url(#botGradient)"/>
    
    <!-- Antenna -->
    <line x1="150" y1="40" x2="150" y2="10" stroke="#8b5cf6" stroke-width="4"/>
    <circle cx="150" cy="10" r="8" fill="#a78bfa"/>
    
    <!-- Eyes -->
    <circle cx="125" cy="70" r="12" fill="#fff"/>
    <circle cx="175" cy="70" r="12" fill="#fff"/>
    <circle cx="128" cy="70" r="6" fill="#1e293b"/>
    <circle cx="178" cy="70" r="6" fill="#1e293b"/>
    
    <!-- Smile -->
    <path d="M 120 100 Q 150 115 180 100" stroke="#fff" stroke-width="4" fill="none" stroke-linecap="round"/>
    
    <!-- Arms -->
    <rect x="40" y="120" width="40" height="15" rx="7" fill="#8b5cf6"/>
    <rect x="220" y="120" width="40" height="15" rx="7" fill="#8b5cf6"/>
    
    <!-- Control panel -->
    <rect x="110" y="150" width="80" height="60" rx="8" fill="#fff" opacity="0.2"/>
    <circle cx="130" cy="170" r="6" fill="#a78bfa"/>
    <circle cx="150" cy="170" r="6" fill="#c4b5fd"/>
    <circle cx="170" cy="170" r="6" fill="#ddd6fe"/>
    <rect x="120" y="190" width="60" height="4" rx="2" fill="#fff" opacity="0.6"/>
    <rect x="120" y="200" width="40" height="4" rx="2" fill="#fff" opacity="0.6"/>
  </g>
  
  <!-- Chat bubbles -->
  <g transform="translate(450, 120)">
    <!-- Bubble 1 -->
    <rect x="0" y="0" width="120" height="50" rx="15" fill="#8b5cf6" opacity="0.3"/>
    <circle cx="30" cy="25" r="4" fill="#8b5cf6"/>
    <circle cx="50" cy="25" r="4" fill="#8b5cf6"/>
    <circle cx="70" cy="25" r="4" fill="#8b5cf6"/>
    
    <!-- Bubble 2 -->
    <rect x="20" y="70" width="140" height="60" rx="15" fill="#6366f1" opacity="0.4"/>
    <rect x="35" y="85" width="80" height="6" rx="3" fill="#6366f1"/>
    <rect x="35" y="100" width="100" height="6" rx="3" fill="#6366f1"/>
    <rect x="35" y="115" width="60" height="6" rx="3" fill="#6366f1"/>
  </g>
  
  <!-- Floating AI elements -->
  <circle cx="100" cy="150" r="6" fill="#8b5cf6" opacity="0.4"/>
  <circle cx="680" cy="180" r="8" fill="#6366f1" opacity="0.3"/>
  <path d="M 120 280 L 140 260 L 160 280 L 140 300 Z" fill="#a78bfa" opacity="0.2"/>
  <path d="M 650 100 L 670 80 L 690 100 L 670 120 Z" fill="#8b5cf6" opacity="0.25"/>
  
  <!-- Brain icon -->
  <g transform="translate(550, 250)">
    <path d="M 30 10 Q 20 5 15 15 Q 10 25 15 35 Q 20 45 30 40 Q 35 50 45 45 Q 55 40 50 30 Q 55 20 45 15 Q 40 10 30 10" 
          fill="none" stroke="#8b5cf6" stroke-width="3" opacity="0.4"/>
    <path d="M 25 20 Q 30 25 35 20" stroke="#8b5cf6" stroke-width="2" fill="none" opacity="0.4"/>
    <path d="M 25 30 Q 30 35 35 30" stroke="#8b5cf6" stroke-width="2" fill="none" opacity="0.4"/>
  </g>
</svg>
