version: "3.9"

services:
  # MySQL Database
  db:
    image: mysql:8.0
    container_name: petguardian-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: petguardian
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./database/schemas:/docker-entrypoint-initdb.d
    networks:
      - petguardian-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: petguardian-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - petguardian-network

  # Spring Boot Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: petguardian-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/petguardian
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      - db
      - redis
    networks:
      - petguardian-network

  # Python AI/ML Service
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: petguardian-ai
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - redis
    networks:
      - petguardian-network

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: petguardian-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - petguardian-network

volumes:
  db_data:

networks:
  petguardian-network:
    driver: bridge
